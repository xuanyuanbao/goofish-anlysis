services:
  mysql:
    image: ${MYSQL_IMAGE:-m.daocloud.io/docker.io/library/mysql:8.4}
    container_name: ${MYSQL_CONTAINER_NAME:-xianyu-mysql}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xianyu_report}
      MYSQL_USER: ${MYSQL_USER:-xianyu}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-xianyu123456}
      TZ: ${MYSQL_TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ${MYSQL_DATA_DIR:-./mysql-data}:/var/lib/mysql
      - ../../db/mysql_init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
